version: 2

builds:
 - binary: oasdiff
   goos:
     - darwin
     - linux
     - windows
   goarch:
     - amd64
     - arm64
   env:
     - CGO_ENABLED=0
   ldflags:
     - -s -w -X github.com/oasdiff/oasdiff/build.Version={{.Version}}

release:
 prerelease: auto

universal_binaries:
 - replace: true

homebrew_casks:
 -
   name: oasdiff
   homepage: "https://github.com/oasdiff/oasdiff"
   description: "A diff tool for OpenAPI Specification."
   repository:
     owner: oasdiff
     name: homebrew-oasdiff
   commit_author:
     name: Reuven Harrison
     email: reuvenharrison@gmail.com
   # The binary is unsigned. Homebrew quarantines cask artifacts (formulae, the
   # previous `brews` output, were not quarantined), so without this Gatekeeper
   # blocks it with "oasdiff is damaged and cannot be opened". Strip the
   # com.apple.quarantine xattr on install.
   hooks:
     post:
       install: |
         if OS.mac?
           system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/oasdiff"]
         end

nfpms:
  # note that this is an array of nfpm configs
  -
    # ID of the nfpm config, must be unique.
    # Defaults to "default".
    id: oasdiff

    # Name of the package.
    # Defaults to `ProjectName`.
    package_name: oasdiff

    # Your app's vendor.
    # Default is empty.
    vendor: oasdiff

    # Template to your app's homepage.
    # Default is empty.
    homepage: "https://github.com/oasdiff/oasdiff"

    # Your app's maintainer (probably you).
    # Default is empty.
    maintainer: Reuven Harrison <reuvenharrison@gmail.com>

    # Template to your app's description.
    # Default is empty.
    description: |-
      A diff tool for OpenAPI Specification.

    # Your app's license.
    # Default is empty.
    license: Apache 2.0

    # Formats to be generated.
    formats:
      - apk
      - deb
      - rpm

    # Section.
    section: default

    # Priority.
    priority: extra


checksum:
 name_template: 'checksums.txt'
