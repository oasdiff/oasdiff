openapi: 3.1.0
info:
  title: Sample API
  version: 1.0.0
paths:
  /products:
    post:
      summary: Create a new product
      operationId: createProduct
      requestBody:
        content:
          application/json:
            schema:
              type:
                - object
                - "null"
              properties:
                name:
                  type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type:
                  - object
                  - "null"
                properties:
                  status:
                    type: string
