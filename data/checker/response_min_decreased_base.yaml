openapi: 3.1.0
info:
  title: Sample API
  version: 1.0.0
paths:
  /products:
    post:
      operationId: createProduct
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                minimum: 10
                exclusiveMinimum: 5
                properties:
                  price:
                    type: number
                    minimum: 100
                    exclusiveMinimum: 50
