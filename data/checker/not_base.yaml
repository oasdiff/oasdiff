openapi: 3.1.0
info:
  title: Sample API
  version: 1.0.0
paths:
  /products:
    post:
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              not:
                type: object
                required: [removed_prop, modified_prop]
                properties:
                  removed_prop:
                    type: string
                  modified_prop:
                    type: string
                    maxLength: 10
      responses:
        "200":
          description: OK
