openapi: 3.1.0
info: {title: t, version: "1.0.1"}
paths:
  /test:
    post:
      operationId: testOp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestRequest"
      responses:
        "200": {description: OK}
components:
  schemas:
    SomeEnum:
      type: string
      enum: [user, serviceAccount]
    SomeObject:
      type: object
      properties:
        a: {type: string}
        c: {$ref: "#/components/schemas/SomeEnum"}
      required: [a]
    TestRequest:
      type: object
      properties:
        optionalEnum:
          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/SomeEnum"
        optionalRef:
          oneOf:
            - type: "null"
            - $ref: "#/components/schemas/SomeObject"
        optionalPrimitive:
          type: [string, "null"]
