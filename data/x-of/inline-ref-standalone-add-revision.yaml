openapi: 3.0.0
info:
  title: ACME
  version: 1.0.0

paths:
  /pets:
    post:
      operationId: updatePets
      requestBody:
        content:
          application/json:
            schema:
              anyOf:
                - type: string
                  enum:
                    - user
                    - superadmin
                - $ref: "#/components/schemas/UserRole"
      responses:
        '200':
          description: ok

components:
  schemas:
    UserRole:
      type: string
      enum:
        - user
        - superadmin
      title: UserRole
