openapi: "3.0.0"
info:
  title: Test
  version: "1.0"
paths:
  /test:
    post:
      operationId: createTest
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  x-stability-level: draft
                status:
                  type: string
                  x-stability-level: draft
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    x-stability-level: draft
                  details:
                    type: string
                    x-stability-level: draft
